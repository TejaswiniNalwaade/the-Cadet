<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements — NCC Management</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎖️ The Cadet</h2><p>NCC Management</p></div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="user-initials">?</div>
      <div>
        <div style="font-size:13px;font-weight:600" id="user-name">—</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.45)" id="user-role">—</div>
      </div>
    </div>
    <!-- CADET NAV -->
    <nav class="nav" id="nav-cadet" style="display:none">
      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="events.html">🚩 Events</a>
      <a href="announcements.html" class="active">📢 Announcements</a>
      <a href="profile.html">👤 My Profile</a>
    </nav>
    <!-- ADMIN NAV -->
    <nav class="nav" id="nav-admin" style="display:none">
      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="cadets.html">👥 Cadets</a>
      <a href="attendance.html">✅ Attendance</a>
      <a href="events.html">🚩 Events</a>
      <a href="announcements.html" class="active">📢 Announcements</a>
      <a href="profile.html">👤 My Profile</a>
      <a href="admin.html">🛡️ Admin Panel</a>
    </nav>
    <div style="padding:16px;margin-top:auto;border-top:1px solid rgba(255,255,255,0.1)">
      <button class="btn btn-sm" style="width:100%;justify-content:center;color:#fff;border-color:rgba(255,255,255,0.2)" onclick="logout()">Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>📢 Announcements</h1>
      <!-- Post button: admin only -->
      <button class="btn btn-primary" id="post-btn" style="display:none" onclick="openModal()">+ New Announcement</button>
    </div>
    <div class="content">
      <div id="alert-box"></div>
      <div class="card">
        <div class="card-body" id="ann-list">Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- New Announcement Modal (admin only) -->
<div class="modal-overlay" id="ann-modal">
  <div class="modal">
    <div class="modal-header"><h3>New Announcement</h3><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Title</label><input type="text" id="ann-title" class="form-control" placeholder="Announcement title"/></div>
      <div class="form-group"><label class="form-label">Message</label><textarea id="ann-body" class="form-control" rows="5" placeholder="Type your announcement here..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="postAnnouncement()">📢 Broadcast</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  requireAuth();
  const role = getRole();

  document.getElementById('user-name').textContent     = getName();
  document.getElementById('user-role').textContent     = role === 'admin' ? 'System Admin' : 'NCC Cadet';
  document.getElementById('user-initials').textContent = (getName()||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  function logout() { localStorage.clear(); window.location.href = '../index.html'; }
  function openModal()  { document.getElementById('ann-modal').classList.add('open'); }
  function closeModal() { document.getElementById('ann-modal').classList.remove('open'); }

  if (role === 'admin') {
    document.getElementById('nav-admin').style.display = '';
    document.getElementById('post-btn').style.display  = '';
  } else {
    document.getElementById('nav-cadet').style.display = '';
  }

  async function loadAnnouncements() {
    const items = await apiGetAnnouncements();
    document.getElementById('ann-list').innerHTML = items.length
      ? items.map(a => `
          <div class="ann-item">
            <div style="display:flex;justify-content:space-between;align-items:start">
              <div class="ann-title">📢 ${a.title}</div>
              ${role === 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteAnn(${a.id})" style="flex-shrink:0;margin-left:10px">Delete</button>` : ''}
            </div>
            <div class="ann-meta">${new Date(a.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
            <div class="ann-body">${a.body}</div>
          </div>`).join('')
      : '<div style="text-align:center;padding:40px;color:#6c757d">No announcements yet.</div>';
  }

  async function postAnnouncement() {
    const title = document.getElementById('ann-title').value.trim();
    const body  = document.getElementById('ann-body').value.trim();
    if (!title || !body) { alert('Please fill both title and message'); return; }
    const res = await apiCreateAnnouncement({ title, body, posted_by: parseInt(getUserId()) });
    if (res.detail) { alert('Error: ' + res.detail); return; }
    closeModal();
    document.getElementById('ann-title').value = '';
    document.getElementById('ann-body').value  = '';
    loadAnnouncements();
  }

  async function deleteAnn(id) {
    if (!confirm('Delete this announcement?')) return;
    const res = await apiDeleteAnnouncement(id);
    if (res.detail) { alert('Error: ' + res.detail); return; }
    loadAnnouncements();
  }

  loadAnnouncements();
</script>
</body>
</html>
